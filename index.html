<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design MD — Extract Design Systems from Any Website</title>
  <meta name="description" content="Paste a URL, get a complete design system markdown. Colors, typography, spacing, shadows — extracted with AI.">
  <style>
    :root{--bg:#fafafa;--sf:#fff;--bd:#e5e5e5;--tx:#171717;--mt:#737373;--ac:#171717;--r:10px;--f:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;--mono:'SF Mono','Fira Code','Cascadia Code',monospace}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:var(--f);background:var(--bg);color:var(--tx);min-height:100vh;-webkit-font-smoothing:antialiased}
    .w{max-width:720px;margin:0 auto;padding:60px 20px 80px}
    .logo{font-size:13px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--mt);margin-bottom:32px}
    h1{font-size:36px;font-weight:700;letter-spacing:-1px;line-height:1.15;margin-bottom:12px}
    .tag{font-size:16px;color:var(--mt);line-height:1.5;margin-bottom:40px}
    .row{display:flex;gap:8px;margin-bottom:16px}
    .row input{flex:1;height:48px;padding:0 16px;border:1.5px solid var(--bd);border-radius:var(--r);font-size:15px;font-family:var(--mono);background:var(--sf);color:var(--tx);outline:none;transition:border-color .15s}
    .row input::placeholder{color:#bfbfbf;font-family:var(--f)}
    .row input:focus{border-color:var(--ac)}
    .btn{height:48px;padding:0 24px;background:var(--ac);color:#fff;border:none;border-radius:var(--r);font-size:14px;font-weight:600;font-family:var(--f);cursor:pointer;white-space:nowrap;transition:opacity .15s}
    .btn:hover{opacity:.85}
    .btn:disabled{opacity:.35;cursor:not-allowed}
    .hint{font-size:12px;color:#a3a3a3;margin-bottom:40px}
    .st{font-size:13px;color:var(--mt);margin-bottom:24px;min-height:20px;display:flex;align-items:center;gap:8px}
    .st.err{color:#dc2626}
    .st.ok{color:#16a34a}
    .sp{width:14px;height:14px;border:2px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:sp .6s linear infinite}
    @keyframes sp{to{transform:rotate(360deg)}}
    .res{display:none}.res.show{display:block}
    .tabs{display:flex;border-bottom:1.5px solid var(--bd);margin-bottom:24px}
    .tab{padding:10px 16px;font-size:13px;font-weight:500;color:var(--mt);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1.5px;transition:all .12s;user-select:none}
    .tab:hover{color:var(--tx)}
    .tab.on{color:var(--tx);border-bottom-color:var(--ac)}
    .pnl{display:none}.pnl.on{display:block}
    .md{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:32px;font-size:14px;line-height:1.75;overflow-x:auto}
    .md h1{font-size:22px;font-weight:700;margin:0 0 8px}
    .md h2{font-size:17px;font-weight:600;margin:28px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--bd)}
    .md h3{font-size:14px;font-weight:600;margin:20px 0 6px}
    .md p{margin:6px 0}
    .md ul,.md ol{margin:6px 0 6px 20px}
    .md li{margin:3px 0}
    .md code{background:#f5f5f5;padding:2px 6px;border-radius:4px;font-size:13px;font-family:var(--mono)}
    .md pre{background:#1a1a1a;color:#d4d4d4;border-radius:8px;padding:16px;overflow-x:auto;margin:10px 0}
    .md pre code{background:none;padding:0;color:inherit}
    .md table{border-collapse:collapse;width:100%;margin:10px 0;font-size:13px}
    .md th,.md td{border:1px solid var(--bd);padding:7px 10px;text-align:left}
    .md th{background:#f8f8f8;font-weight:600}
    .md blockquote{border-left:3px solid var(--bd);padding-left:14px;color:var(--mt);margin:10px 0}
    .md hr{border:none;border-top:1px solid var(--bd);margin:20px 0}
    .rw{position:relative}
    .raw{background:#1a1a1a;color:#d4d4d4;border-radius:var(--r);padding:24px;font-family:var(--mono);font-size:12.5px;line-height:1.65;overflow-x:auto;white-space:pre-wrap;word-break:break-word;max-height:560px;overflow-y:auto}
    .cb{display:flex;gap:8px;margin-bottom:12px}
    .cb button{padding:7px 14px;background:var(--sf);border:1px solid var(--bd);border-radius:6px;font-size:12px;font-weight:500;font-family:var(--f);cursor:pointer;transition:border-color .12s}
    .cb button:hover{border-color:var(--ac)}
    .swg{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px}
    .sw{border:1px solid var(--bd);border-radius:8px;overflow:hidden;background:var(--sf)}
    .swc{height:56px}
    .swi{padding:8px}
    .swx{font-family:var(--mono);font-size:11.5px;font-weight:500}
    .swn{font-size:10px;color:var(--mt);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .swu{font-size:9.5px;color:#a3a3a3;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .fl{display:flex;flex-direction:column;gap:14px}
    .fc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:20px}
    .fn{font-family:var(--mono);font-size:12px;color:var(--mt);margin-bottom:6px}
    .fs{font-size:26px;margin-bottom:6px}
    .fm{font-size:11px;color:#a3a3a3}
    .emp{text-align:center;padding:60px 20px;color:var(--mt);font-size:14px}
    .emp-i{font-size:40px;margin-bottom:12px;opacity:.3}
    .src{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500;margin-left:8px}
    .src.llm{background:#dbeafe;color:#1d4ed8}
    .src.css{background:#fef3c7;color:#92400e}
    @media(max-width:520px){.w{padding:40px 16px 60px}h1{font-size:28px}.row{flex-direction:column}.btn{width:100%}}
  </style>
</head>
<body>
<div class="w">
  <div class="logo">Design MD</div>
  <h1>Extract design systems<br>from any website</h1>
  <p class="tag">Paste a URL. Get colors, typography, spacing, shadows, radii, layout — all as clean markdown, powered by AI.</p>
  <div class="row">
    <input type="url" id="url" placeholder="https://stripe.com" autofocus>
    <button class="btn" id="go" onclick="run()">Extract</button>
  </div>
  <div class="hint">Backend calls LLM for deep analysis · don't input sensitive URLs</div>
  <div class="st" id="st"></div>
  <div class="res" id="res">
    <div class="tabs">
      <div class="tab on" data-t="preview">Preview</div>
      <div class="tab" data-t="raw">Markdown</div>
      <div class="tab" data-t="colors">Colors</div>
      <div class="tab" data-t="fonts">Fonts</div>
    </div>
    <div class="pnl on" id="p-preview"><div class="md" id="mdv"></div></div>
    <div class="pnl" id="p-raw">
      <div class="cb"><button onclick="cp()">Copy</button><button onclick="dl()">Download .md</button></div>
      <div class="rw"><div class="raw" id="rawv"></div></div>
    </div>
    <div class="pnl" id="p-colors"><div class="swg" id="swg"></div></div>
    <div class="pnl" id="p-fonts"><div class="fl" id="flist"></div></div>
  </div>
</div>
<script>
let M='',D={};
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.pnl').forEach(x=>x.classList.remove('on'));
  t.classList.add('on');
  document.getElementById('p-'+t.dataset.t).classList.add('on');
});
document.getElementById('url').onkeydown=e=>{if(e.key==='Enter')run()};

async function run(){
  const raw=document.getElementById('url').value.trim();
  if(!raw)return;
  const url=raw.startsWith('http')?raw:'https://'+raw;
  const btn=document.getElementById('go'),st=document.getElementById('st'),res=document.getElementById('res');
  btn.disabled=true;btn.textContent='Extracting…';
  st.className='st';st.innerHTML='<div class="sp"></div> Fetching & analyzing with AI…';
  res.classList.remove('show');
  try{
    const r=await fetch('/api/analyze',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({url})
    });
    const data=await r.json();
    if(data.error)throw new Error(data.error);
    D=data.design||{};
    D._url=url;
    M=genMd(D);
    document.getElementById('mdv').innerHTML=renderMd(M);
    document.getElementById('rawv').textContent=M;
    renderSwatches(D.colors||[]);
    renderFonts(D.fonts||[]);
    const src=D._source==='llm'?'<span class="src llm">AI</span>':'<span class="src css">CSS</span>';
    st.className='st ok';
    st.innerHTML='✓ '+(D.theme?D.theme+' theme · ':'')+url+' '+src;
    res.classList.add('show');
  }catch(e){st.className='st err';st.textContent='Error: '+e.message}
  finally{btn.disabled=false;btn.textContent='Extract'}
}

/* ─── MARKDOWN ─── */
function genMd(d){
  const L=[];
  const host=(()=>{try{return new URL(d._url||'').hostname}catch{return''}})();
  L.push(`# Design System: ${host}`);
  L.push(`\n> Extracted from [${d._url||''}](${d._url||''})`);
  if(d._source==='llm')L.push('> Powered by AI analysis');
  L.push('');

  if(d.design_style||d.theme){
    L.push('## Overview\n');
    if(d.theme)L.push(`- **Theme:** ${d.theme}`);
    if(d.design_style)L.push(`- **Style:** ${d.design_style}`);
    L.push('');
  }

  // colors
  if(d.colors&&d.colors.length){
    L.push('## Colors\n');
    L.push('| Color | Hex | Usage |');
    L.push('|-------|-----|-------|');
    d.colors.forEach(c=>{
      const display=c.hex||c.value||c;
      const name=c.name||'';
      const usage=c.usage||'';
      L.push(`| ![](https://placehold.co/20x20/${String(display).replace('#','')}/${String(display).replace('#','')}.png?text=+) | \`${display}\` | ${name} ${usage?'— '+usage:''} |`);
    });
    L.push('');

    L.push('### CSS Variables\n');
    L.push('```css');
    L.push(':root {');
    if(d.css_variables){
      // use LLM's css_variables directly
      const vars=d.css_variables.replace(/:root\s*\{/,'').replace(/\}$/,'').trim();
      L.push(vars);
    }else{
      const names=['--color-primary','--color-secondary','--color-accent','--color-bg','--color-bg-alt','--color-surface','--color-text','--color-text-muted','--color-border','--color-link'];
      d.colors.slice(0,10).forEach((c,i)=>{
        const hex=c.hex||c.value||c;
        L.push(`  ${names[i]||'--color-'+i}: ${hex};`);
      });
    }
    L.push('}');
    L.push('```\n');
  }

  // typography
  if(d.fonts&&d.fonts.length){
    L.push('## Typography\n');
    d.fonts.forEach(f=>{
      L.push(`### \`${f.name}\`\n`);
      if(f.weights)L.push(`- **Weights:** ${f.weights.join(', ')}`);
      if(f.sizes)L.push(`- **Sizes:** ${f.sizes.join(', ')}`);
      if(f.usage)L.push(`- **Usage:** ${f.usage}`);
      L.push('');
    });
  }

  if(d.typography){
    const t=d.typography;
    if(t.heading_sizes){
      L.push('### Heading Scale\n');
      Object.entries(t.heading_sizes).forEach(([k,v])=>{
        L.push(`- **${k.toUpperCase()}:** ${v}`);
      });
      L.push('');
    }
    if(t.body_size)L.push(`- **Body:** ${t.body_size}\n`);
    if(t.line_heights)L.push(`- **Line Heights:** ${t.line_heights.join(', ')}\n`);
    if(t.letter_spacings)L.push(`- **Letter Spacing:** ${t.letter_spacings.join(', ')}\n`);
  }

  // spacing
  if(d.spacing){
    const s=d.spacing;
    L.push('## Spacing System\n');
    if(s.unit)L.push(`- **Base Unit:** ${s.unit}`);
    if(s.scale)L.push(`- **Scale:** ${s.scale.join(' → ')}`);
    if(s.section_padding)L.push(`- **Section Padding:** ${s.section_padding}`);
    if(s.component_gap)L.push(`- **Component Gap:** ${s.component_gap}`);
    L.push('');

    if(s.scale){
      L.push('### CSS Variables\n');
      L.push('```css');
      L.push(':root {');
      const spNames=['--space-1','--space-2','--space-3','--space-4','--space-5','--space-6','--space-8','--space-10','--space-12','--space-16'];
      s.scale.forEach((v,i)=>L.push(`  ${spNames[i]||'--space-'+i}: ${v};`));
      L.push('}');
      L.push('```\n');
    }
  }

  // borders
  if(d.borders){
    const b=d.borders;
    L.push('## Borders & Radii\n');
    if(b.radius)L.push(`- **Radius:** ${b.radius.join(', ')}`);
    if(b.width)L.push(`- **Width:** ${b.width.join(', ')}`);
    if(b.color)L.push(`- **Color:** \`${b.color}\``);
    L.push('');
  }

  // shadows
  if(d.shadows&&d.shadows.length){
    L.push('## Shadows\n');
    L.push('```css');
    d.shadows.forEach(s=>L.push(`box-shadow: ${s};`));
    L.push('```\n');
  }

  // layout
  if(d.layout){
    const l=d.layout;
    L.push('## Layout\n');
    if(l.max_width)L.push(`- **Max Width:** \`${l.max_width}\``);
    L.push(`- **Nav:** ${l.has_nav?'✓':'✗'}`);
    L.push(`- **Footer:** ${l.has_footer?'✓':'✗'}`);
    L.push(`- **Sidebar:** ${l.has_sidebar?'✓':'✗'}`);
    L.push(`- **Grid:** ${l.uses_grid?'✓':'✗'}`);
    L.push(`- **Flexbox:** ${l.uses_flex?'✓':'✗'}`);
    L.push('');
  }

  // components
  if(d.components){
    L.push('## Components\n');
    Object.entries(d.components).forEach(([k,v])=>{
      if(v)L.push(`### ${k.charAt(0).toUpperCase()+k.slice(1)}\n${typeof v==='string'?v:JSON.stringify(v)}\n`);
    });
  }

  L.push('---');
  const c1=(d.colors||[]).length,c2=(d.fonts||[]).length;
  L.push(`*${c1} colors · ${c2} font families extracted*`);

  return L.join('\n');
}

function renderMd(md){
  return md
    .replace(/```(\w*)\n([\s\S]*?)```/g,'<pre><code>$2</code></pre>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>')
    .replace(/^---$/gm,'<hr>')
    .replace(/^\|(.+)\|$/gm,(_,c)=>{
      if(c.match(/^[\s\-|]+$/))return '';
      return '<tr>'+c.split('|').map(x=>`<td>${x.trim()}</td>`).join('')+'</tr>';
    })
    .replace(/(<tr>[\s\S]*?<\/tr>)/g,'<table>$1</table>')
    .replace(/<\/table>\s*<table>/g,'')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>[\s\S]*?<\/li>)/g,'<ul>$1</ul>')
    .replace(/<\/ul>\s*<ul>/g,'')
    .replace(/\n\n/g,'</p><p>')
    .replace(/\n/g,'<br>');
}

function renderSwatches(colors){
  const el=document.getElementById('swg');
  if(!colors.length){el.innerHTML='<div class="emp"><div class="emp-i">🎨</div>No colors detected</div>';return}
  el.innerHTML=colors.map(c=>{
    const hex=c.hex||c.value||c;
    const name=c.name||'';
    const usage=c.usage||'';
    return `<div class="sw"><div class="swc" style="background:${hex}"></div><div class="swi"><div class="swx">${hex}</div>${name?`<div class="swn">${name}</div>`:''}${usage?`<div class="swu">${usage}</div>`:''}</div></div>`;
  }).join('');
}

function renderFonts(fonts){
  const el=document.getElementById('flist');
  if(!fonts.length){el.innerHTML='<div class="emp"><div class="emp-i">Aa</div>No fonts detected</div>';return}
  el.innerHTML=fonts.map(f=>{
    return `<div class="fc"><div class="fn">${f.name}</div><div class="fs" style="font-family:${f.name}">The quick brown fox jumps</div><div class="fm">${[f.weights?'Weights: '+f.weights.join(', '):'',f.sizes?'Sizes: '+f.sizes.join(', '):'',f.usage||''].filter(Boolean).join(' · ')}</div></div>`;
  }).join('');
}

function cp(){navigator.clipboard.writeText(M).then(()=>{const b=event.target;b.textContent='Copied!';setTimeout(()=>b.textContent='Copy',1200)})}
function dl(){const b=new Blob([M],{type:'text/markdown'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='design-system.md';a.click()}
</script>
</body>
</html>
